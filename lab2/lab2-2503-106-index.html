<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数字展销平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 头部固定定位 -->
<div class="header">
    <div class="logo">数字展销平台</div>
    <img src="image/ludong.jpg" class="logo" alt="">
    <ul class="nav">
        <li>首页</li>
        <li>图书分类</li>
        <li>优惠活动</li>
        <li>关于我们</li>
    </ul>
</div>

<!-- 主体三栏 -->
<div class="main">

    <!-- 左侧：相对定位 -->
    <div class="left-bar">
        <h3>图书分类</h3>
        <a>小说</a>
        <a>科技</a>
        <a>教育</a>
        <a>历史</a>
    </div>

    <!-- 中间：热门推荐 + 新书 -->
    <div class="middle-bar">
        <div class="hot-book">
            <h3>热门推荐</h3>
            <div class="book-list">

                <!-- 图1 -->
                <div class="book-item">
                    <img src="image/book1.jpg" alt="《红楼梦》">
                    <div class="book-intro">
                        <p>《红楼梦》</p>
                        <p>曹雪芹</p>
                    </div>
                </div>

                <!-- 图2 -->
                <div class="book-item">
                    <img src="image/book2.jpg" alt="《骆驼祥子》">
                    <div class="book-intro">
                        <p>《骆驼祥子》</p>
                        <p>老舍</p>
                    </div>
                </div>

                <!-- 图3 -->
                <div class="book-item">
                    <img src="image/book3.jpg" alt="《复活》">
                    <div class="book-intro">
                        <p>《复活》</p>
                        <p>列夫·托尔斯泰</p>
                    </div>
                </div>

            </div>
        </div>

        <div class="new-book">
            <h3>新书上市</h3>
            <table>
                <tr>
                    <th>书名</th>
                    <th>作者</th>
                    <th>价格</th>
                </tr>
                <tr>
                    <td>《故乡》</td>
                    <td>鲁迅</td>
                    <td>59.9</td>
                </tr>
                <tr>
                    <td>《狼王梦》</td>
                    <td>沈石溪</td>
                    <td>69.9</td>
                </tr>
            </table>
        </div>
    </div>

    <!-- 右侧：固定定位 -->
    <div class="right-bar">
        <h3>促销信息</h3>
        <p>满100减20</p>
        <p>新书8折</p>
        <p>会员9折</p>
    </div>
    
</div>

</body>
</html>
